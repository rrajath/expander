name: Build and Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: semver
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}

          # Split version into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Check commit message for version bump hints
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if echo "$COMMIT_MSG" | grep -qiE '\[major\]|breaking change'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '\[minor\]|feat:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          echo "New version: $NEW_TAG (versionCode: $VERSION_CODE)"

      - name: Update version in build.gradle.kts
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.semver.outputs.version_code }}/" app/build.gradle.kts
          sed -i 's/versionName = "[^"]*"/versionName = "${{ steps.semver.outputs.new_version }}"/' app/build.gradle.kts

          echo "Updated build.gradle.kts:"
          grep -A 2 "versionCode\|versionName" app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > ${{ github.workspace }}/release-keystore.jks
          else
            echo "Warning: No keystore found. Release APK will be unsigned."
          fi

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          VERSION="${{ steps.semver.outputs.new_version }}"

          # Rename debug APK
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/expander-$VERSION-debug.apk

          # Rename release APK
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               app/build/outputs/apk/release/expander-$VERSION-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               app/build/outputs/apk/release/expander-$VERSION-release-unsigned.apk
          fi

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.new_tag }} -m "Release ${{ steps.semver.outputs.new_tag }}"
          git push origin ${{ steps.semver.outputs.new_tag }}

      - name: Generate Release Notes
        id: release_notes
        run: |
          VERSION="${{ steps.semver.outputs.new_version }}"
          PREV_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          echo "## What's Changed" > release_notes.md
          echo "" >> release_notes.md

          # Get commits since last tag
          if [ "$PREV_TAG" != "v0.0.0" ]; then
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> release_notes.md
          else
            git log --pretty=format:"- %s (%h)" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Downloads" >> release_notes.md
          echo "- \`expander-$VERSION-debug.apk\` - Debug build for testing" >> release_notes.md
          echo "- \`expander-$VERSION-release.apk\` - Production build (signed)" >> release_notes.md

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          name: Release ${{ steps.semver.outputs.new_version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/expander-${{ steps.semver.outputs.new_version }}-debug.apk
            app/build/outputs/apk/release/expander-${{ steps.semver.outputs.new_version }}-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ steps.semver.outputs.new_version }}
          path: app/build/outputs/apk/debug/expander-${{ steps.semver.outputs.new_version }}-debug.apk
          retention-days: 90

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.semver.outputs.new_version }}
          path: app/build/outputs/apk/release/expander-${{ steps.semver.outputs.new_version }}-*.apk
          retention-days: 90
